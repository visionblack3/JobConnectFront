<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - JobConnect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-container">

    <div class="card">
        <h2>Job Connect</h2>

        <div id="error-message" class="error">Invalid username or password.</div>
        <div id="logout-message" class="success">You have been logged out.</div>

        <form id="loginForm">
            <input type="text" id="username" name="username" placeholder="Username" required>
            <input type="password" id="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn btn-primary">Login</button>
            <p style="text-align:center;">New here? <a href="register.html">Register</a></p>
        </form>
    </div>

</div> <script src="script.js"></script>
</body>
</html>
