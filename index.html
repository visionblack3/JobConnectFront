<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JobConnect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-container">
    <div class="card">
        <h2>JobConnect</h2>

        <div id="error-message" class="error">Invalid username or password.</div>
        <div id="logout-message" class="success">You have been logged out.</div>

        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            
            <button type="submit" class="btn btn-primary">Login</button>
            
            <p class="mt-3">New here? <a href="register.html">Register</a></p>
        </form>
    </div>
</div>

<script src="script.js"></script>

<script>
    // Special logic for the "Logged Out" message
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('logout')) {
            const logoutMsg = document.getElementById('logout-message');
            if (logoutMsg) logoutMsg.style.display = 'block';
        }
    });
</script>

</body>
</html>
